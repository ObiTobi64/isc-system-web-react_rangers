name: Frontend CI/CD
on: [push]
jobs:
  test-build-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Setup Node
      uses: actions/setup-node@v2
      with:
        node-version: 18
    - run: npm install
    - run: npm test
    - name: Build  # Test en runner
      run: npm run build
    - name: Deploy to VM1 (con SSH y Nginx)
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VM1_HOST }}
        username: ${{ secrets.VM1_USER }}
        key: ${{ secrets.DEPLOY_KEY }}
        script: |
          REPO_DIR=~/isc-system-web-react_rangers
          APP_DIR=$REPO_DIR  # Usa raíz directamente (no subcarpeta)
          mkdir -p $REPO_DIR
          if [ ! -d "$REPO_DIR/.git" ]; then
            echo "Clonando repo por primera vez..."
            git clone https://github.com/ObiTobi64/isc-system-web-react_rangers.git $REPO_DIR
          else
            echo "Repo existe, actualizando..."
          fi
          cd $APP_DIR
          echo "Estructura actual: $(ls -la | head -10)"  # Más logs para package.json y src
          git fetch --all
          git reset --hard origin/qa  # Usa branch 'qa' (default del repo)
          npm ci  # Full install (incluye dev deps para tsc/husky)
          npm run build || true  # Build, ignora si hook falla minor
          if [ -d "dist" ]; then
            echo "Build OK: dist/ generado"
            sudo rm -rf /var/www/html/*
            sudo cp -r dist/* /var/www/html/
            echo "Archivos copiados: $(ls dist/ | wc -l) items"
          else
            echo "ERROR: No dist/ generado - chequea build logs"
            exit 1  # Falla job si no build
          fi
          sudo chown -R www-data:www-data /var/www/html/
          sudo chmod -R 755 /var/www/html/
          sudo find /var/www/html/ -type f -exec chmod 644 {} \;
          sudo systemctl reload nginx
          echo "Deploy UPB completado en $(date)"