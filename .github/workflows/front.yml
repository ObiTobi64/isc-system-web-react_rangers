name: Frontend CI/CD
on: [push]
jobs:
  test-build-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Setup Node
      uses: actions/setup-node@v2
      with:
        node-version: 18
    - run: npm install
    - run: npm test
    - name: Build  # Test en runner (GitHub tiene más RAM)
      run: npm run build
    - name: Deploy to VM1 (con SSH y Nginx)
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VM1_HOST }}
        username: ${{ secrets.VM1_USER }}
        key: ${{ secrets.DEPLOY_KEY }}
        script: |
          REPO_DIR=~/isc-system-web-react_rangers
          APP_DIR=$REPO_DIR  # Raíz del repo
          mkdir -p $REPO_DIR
          if [ ! -d "$REPO_DIR/.git" ]; then
            echo "Clonando repo por primera vez..."
            git clone https://github.com/ObiTobi64/isc-system-web-react_rangers.git $REPO_DIR
          else
            echo "Repo existe, actualizando..."
          fi
          cd $APP_DIR
          echo "Estructura actual: $(ls -la | head -10)"
          git fetch --all
          git reset --hard origin/qa  # Branch qa
          npm ci  # Full install
          # Limpiar memoria antes del build
          rm -rf dist/ node_modules/.vite .cache
          sync && echo 3 | sudo tee /proc/sys/vm/drop_caches > /dev/null
          export NODE_OPTIONS="--max-old-space-size=3072"
          npm run build || echo "Build parcial; chequea logs"
          if [ -d "dist" ] && [ $(ls dist/ | wc -l) -gt 10 ]; then  # Chequea archivos reales
            echo "Build OK: dist/ con $(ls dist/ | wc -l) items"
            sudo rm -rf /var/www/html/*
            sudo cp -r dist/* /var/www/html/
            echo "Copiados: $(ls /var/www/html/ | wc -l) items"
          else
            echo "ERROR: Build falló o dist/ incompleto (solo $(ls dist/ 2>/dev/null | wc -l) items)"
            exit 1
          fi
          sudo chown -R www-data:www-data /var/www/html/
          sudo chmod -R 755 /var/www/html/
          sudo find /var/www/html/ -type f -exec chmod 644 {} \;
          sudo systemctl reload nginx
          echo "Deploy UPB completado en $(date)"