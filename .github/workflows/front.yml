name: Deploy Fronteeeend 

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install 

      - name: Escribir .env 
        run: |
          echo "VITE_API_URL=${{ secrets.FRONTEND_ENV }}" > .env

      - name: Build del frontend
        run: npm run build 

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Upload frontend files with SCP 
        run: |
          echo "${{ secrets.EC2_KEY }}" > private_key.pem
          chmod 600 private_key.pem

          # Crear directorio y limpiar
          ssh -i private_key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            sudo mkdir -p /var/www/html
            sudo rm -rf /var/www/html/*
            df -h /
          EOF

          # Copiar a home primero
          scp -i private_key.pem -r dist ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/

          # Mover con sudo
          ssh -i private_key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            sudo cp -r ~/dist/* /var/www/html/
            echo '${{ secrets.FRONTEND_ENV }}' | sudo tee /var/www/html/.env > /dev/null
            sudo chmod 600 /var/www/html/.env
            sudo chown -R www-data:www-data /var/www/html/
            rm -rf ~/dist
          EOF

          rm private_key.pem

      - name: Install and Reload Apache
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Instalar Apache2 si no existe
            if ! systemctl is-active --quiet apache2; then
              sudo apt-get update
              sudo apt-get install -y apache2
              sudo systemctl enable apache2
              sudo systemctl start apache2
            else
              sudo systemctl restart apache2
            fi